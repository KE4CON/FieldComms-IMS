<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resource Map — Incident Management Starcom</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
html,body{height:100%;margin:0;overflow:hidden;}
body{display:flex;flex-direction:column;}
.top-bar{flex-shrink:0;background:var(--panel);border-bottom:2px solid var(--blue);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.top-bar h1{font-family:var(--font-hd);font-size:15px;color:var(--blue);letter-spacing:2px;margin:0;}
.spacer{flex:1;}
.map-wrap{flex:1;display:flex;min-height:0;position:relative;}
#map{flex:1;}
.sidebar{width:280px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--line);}
.stab{flex:1;padding:9px 6px;font-size:11px;font-family:var(--font-hd);letter-spacing:0.5px;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;}
.stab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-content{flex:1;overflow-y:auto;padding:10px;display:none;}
.tab-content.active{display:block;}
.unit-item{padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer;transition:background 0.1s;}
.unit-item:hover{background:var(--panel2);}
.unit-call{font-family:var(--font-hd);font-size:13px;color:var(--txt);}
.unit-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.unit-status{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:bold;}
.s-available{background:rgba(80,200,80,0.2);color:var(--green);}
.s-busy{background:rgba(245,166,35,0.2);color:var(--eoc);}
.s-oos{background:rgba(220,60,60,0.2);color:var(--red);}
.s-staged{background:rgba(96,170,255,0.2);color:var(--blue);}
.form-col{display:flex;flex-direction:column;gap:8px;}
.form-col label{font-size:11px;color:var(--muted);}
.form-col input,.form-col select,.form-col textarea{width:100%;box-sizing:border-box;}
.map-controls{position:absolute;top:10px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:6px;}
.map-btn{background: var(--input-bg);border:1px solid var(--line);border-radius:6px;padding:7px 12px;font-size:11px;color:var(--txt);cursor:pointer;white-space:nowrap;}
.map-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(96,170,255,0.1);}
.badge-count{display:inline-block;background:var(--blue);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:bold;margin-left:4px;}
</style>
</head>
<body>
<nav class="nav-bar" style="flex-shrink:0;">
  <a href="index.html" class="nav-logo">⬡ Incident Management</a>
  <div class="nav-links">
    <a href="index.html?mode=starcom">🚔 Starcom</a>
    <a href="starcom.html">Starcom Net</a>
    <a href="resmap.html" class="active">Resource Map</a>
    <a href="tactical.html">APRS Tactical</a>
  </div>
  <div class="nav-right">
    <span id="utc-clock" style="font-family:var(--font-hd);color:var(--green);font-size:13px;letter-spacing:1px;"></span>
  </div>
</nav>

<div class="top-bar">
  <h1>🗺 STARCOM RESOURCE MAP</h1>
  <div style="font-size:11px;color:var(--muted);">Public safety unit &amp; resource positioning</div>
  <div class="spacer"></div>
  <div style="font-size:11px;color:var(--muted);">Units: <span id="unit-count" style="color:var(--blue);font-weight:bold;">0</span></div>
  <button class="btn btn-primary" onclick="activateTab('add')" style="font-size:11px;padding:5px 10px;background:var(--blue);border-color:var(--blue);">+ Add Unit</button>
</div>

<div class="map-wrap">
  <div id="map"></div>
  <div class="map-controls">
    <button class="map-btn active" id="btn-units" onclick="toggleLayer('units')">🚔 Units</button>
    <button class="map-btn active" id="btn-zones" onclick="toggleLayer('zones')">🗂 Zones</button>
  </div>
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" id="tab-units" onclick="activateTab('units')">Units <span class="badge-count" id="u-badge">0</span></button>
      <button class="stab" id="tab-add" onclick="activateTab('add')">+ Add</button>
      <button class="stab" id="tab-zones" onclick="activateTab('zones')">Zones</button>
    </div>

    <!-- Units list -->
    <div class="tab-content active" id="tc-units">
      <div id="unit-list"><div style="color:var(--muted);font-size:12px;padding:20px;text-align:center;">No units added yet.</div></div>
    </div>

    <!-- Add unit -->
    <div class="tab-content" id="tc-add">
      <div class="form-col">
        <div style="font-size:11px;color:var(--blue);font-family:var(--font-hd);letter-spacing:1px;margin-bottom:4px;">ADD / UPDATE UNIT</div>
        <div><label>Radio ID / Unit #</label><input type="text" id="u-id" placeholder="Unit 7, 5B12, etc."></div>
        <div><label>Unit Name / Description</label><input type="text" id="u-name" placeholder="Engine 7, EOC Liaison…"></div>
        <div><label>Type</label>
          <select id="u-type">
            <option>Law Enforcement</option>
            <option>Fire</option>
            <option>EMS</option>
            <option>EOC Staff</option>
            <option>Public Works</option>
            <option>Volunteer</option>
            <option>ARES/RACES</option>
            <option>Search &amp; Rescue</option>
            <option>Other</option>
          </select>
        </div>
        <div><label>Status</label>
          <select id="u-status">
            <option value="available">Available</option>
            <option value="busy">Busy/Engaged</option>
            <option value="staged">Staged/Standby</option>
            <option value="oos">Out of Service</option>
          </select>
        </div>
        <div><label>Latitude</label><input type="number" id="u-lat" step="0.0001" placeholder="42.3153"></div>
        <div><label>Longitude</label><input type="number" id="u-lon" step="0.0001" placeholder="-88.4473"></div>
        <div><label>Assignment / Location</label><input type="text" id="u-assign" placeholder="Shelter A, Sector 3…"></div>
        <div><label>Notes</label><textarea id="u-notes" rows="2"></textarea></div>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-secondary" onclick="pickUnit()" style="flex:1;font-size:11px;">🗺 Pick on Map</button>
          <button class="btn btn-primary" onclick="saveUnit()" style="flex:1;font-size:11px;background:var(--blue);border-color:var(--blue);">Save Unit</button>
        </div>
      </div>
    </div>

    <!-- Zones tab -->
    <div class="tab-content" id="tc-zones">
      <div class="form-col">
        <div style="font-size:11px;color:var(--blue);font-family:var(--font-hd);letter-spacing:1px;margin-bottom:4px;">DRAW ZONE</div>
        <div><label>Zone Name</label><input type="text" id="z-name" placeholder="Sector A, Evacuation Zone 1…"></div>
        <div><label>Color</label>
          <select id="z-color">
            <option value="#60aaff">Blue — Operations</option>
            <option value="#50c850">Green — Clear/Safe</option>
            <option value="#f5a623">Amber — Caution</option>
            <option value="#dc3c3c">Red — Danger/Restricted</option>
            <option value="#e040fb">Purple — Special Ops</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startZone()" style="font-size:11px;background:var(--blue);border-color:var(--blue);">🖊 Draw Zone (click map corners)</button>
        <button class="btn btn-secondary" onclick="finishZone()" style="font-size:11px;">✓ Finish Zone</button>
        <button class="btn btn-danger" onclick="clearZones()" style="font-size:11px;">🗑 Clear All Zones</button>
        <hr style="border-color:var(--line);margin:4px 0;">
        <div id="zone-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="/lib/tiles.js"></script>
<script>
const API = 'http://192.168.50.1:5050';
let map, unitLayer, zoneLayer;
let units = [], zones = [];
let pickingUnit = false;
let drawingZone = false, zonePoints = [], zonePoly = null;

setInterval(()=>{ document.getElementById('utc-clock').textContent = new Date().toUTCString().slice(17,22)+'Z'; },1000);

function initMap() {
  const center = [42.3153, -88.4473];
  map = L.map('map').setView(center, 11);
  unitLayer = L.layerGroup().addTo(map);
  zoneLayer = L.layerGroup().addTo(map);
  // Set up tile layers via FC_TILES (offline MBTiles + online fallback)
  FC_TILES.buildLayerControl(map, { statusElementId: 'tileStatus' }).then(() => {
    const status = FC_TILES.getStatus();
    const el = document.getElementById('tileStatus');
    if (el) el.textContent = status.availableOffline.length > 0
      ? `📁 ${status.availableOffline.length} offline tileset(s) loaded`
      : status.internetAvailable ? '🌐 Online tiles' : '⚠ No tiles available';
  });

  map.on('click', e => {
    if(pickingUnit) {
      document.getElementById('u-lat').value = e.latlng.lat.toFixed(5);
      document.getElementById('u-lon').value = e.latlng.lng.toFixed(5);
      pickingUnit = false; map.getContainer().style.cursor='';
      activateTab('add'); return;
    }
    if(drawingZone) {
      zonePoints.push([e.latlng.lat, e.latlng.lng]);
      if(zonePoly) zoneLayer.removeLayer(zonePoly);
      if(zonePoints.length >= 2) {
        const col = document.getElementById('z-color').value;
        zonePoly = L.polygon(zonePoints,{color:col,fillColor:col,fillOpacity:0.15,weight:2}).addTo(zoneLayer);
      }
    }
  });

  loadData();
}

async function loadData() {
  try {
    const r = await fetch(`${API}/api/resmap`);
    if(r.ok) { const d = await r.json(); units=d.units||[]; zones=d.zones||[]; }
  } catch {
    const s = localStorage.getItem('fc_resmap');
    if(s) { const d=JSON.parse(s); units=d.units||[]; zones=d.zones||[]; }
  }
  renderAll();
}

function saveData() {
  const d = {units, zones};
  localStorage.setItem('fc_resmap', JSON.stringify(d));
  fetch(`${API}/api/resmap`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(()=>{});
}

const TYPE_ICONS = {
  'Law Enforcement':'🚔','Fire':'🚒','EMS':'🚑','EOC Staff':'🏛',
  'Public Works':'🚧','Volunteer':'🙋','ARES/RACES':'📻',
  'Search & Rescue':'🔍','Other':'🔵'
};

function renderAll() {
  document.getElementById('unit-count').textContent = units.length;
  document.getElementById('u-badge').textContent = units.length;
  renderUnits(); renderZones(); renderUnitList();
}

function renderUnits() {
  unitLayer.clearLayers();
  units.forEach((u,i) => {
    if(!u.lat||!u.lon) return;
    const colors = {available:'#50c850',busy:'#f5a623',staged:'#60aaff',oos:'#888'};
    const color = colors[u.status]||'#888';
    const icon = L.divIcon({
      html:`<div style="background:${color};border:2px solid rgba(255,255,255,0.8);border-radius:50%;width:12px;height:12px;box-shadow:0 0 6px ${color}80;"></div>`,
      iconSize:[12,12],iconAnchor:[6,6],className:''
    });
    L.marker([u.lat,u.lon],{icon}).addTo(unitLayer)
     .bindPopup(`<div style="font-size:12px;min-width:140px;">
       <div style="font-weight:bold;font-size:14px;">${TYPE_ICONS[u.type]||'🔵'} ${esc(u.unit_id)}</div>
       <div>${esc(u.name)}</div>
       <div style="color:#555;margin-top:4px;">${u.status} · ${esc(u.assignment||'')}</div>
       ${u.notes?`<div style="color:#777;font-size:11px;">${esc(u.notes)}</div>`:''}
       <div style="margin-top:8px;">
         <button onclick="editUnit(${i})" style="font-size:11px;padding:3px 8px;cursor:pointer;">Edit</button>
         <button onclick="removeUnit(${i})" style="font-size:11px;padding:3px 8px;cursor:pointer;margin-left:4px;color:#dc3c3c;">Remove</button>
       </div>
     </div>`);
  });
}

function renderZones() {
  zoneLayer.clearLayers();
  zones.forEach((z,i) => {
    if(!z.points||z.points.length<3) return;
    const poly = L.polygon(z.points,{color:z.color,fillColor:z.color,fillOpacity:0.15,weight:2}).addTo(zoneLayer);
    poly.bindPopup(`<div style="font-size:12px;">
      <div style="font-weight:bold;">${esc(z.name)}</div>
      <button onclick="removeZone(${i})" style="font-size:11px;padding:3px 8px;cursor:pointer;margin-top:6px;color:#dc3c3c;">Remove Zone</button>
    </div>`);
  });
  const list = document.getElementById('zone-list');
  list.innerHTML = zones.map((z,i)=>`
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--line);font-size:11px;">
      <div style="width:10px;height:10px;border-radius:2px;background:${z.color};flex-shrink:0;"></div>
      <span style="flex:1;color:var(--txt);">${esc(z.name)}</span>
      <button class="btn btn-danger" onclick="removeZone(${i})" style="padding:2px 6px;font-size:10px;">✕</button>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:11px;text-align:center;padding:8px;">No zones.</div>';
}

function renderUnitList() {
  const list = document.getElementById('unit-list');
  if(!units.length) {
    list.innerHTML='<div style="color:var(--muted);font-size:12px;padding:20px;text-align:center;">No units. Add one using the + Add tab.</div>'; return;
  }
  list.innerHTML = units.map((u,i)=>`
    <div class="unit-item" onclick="panTo(${u.lat},${u.lon})">
      <div style="display:flex;align-items:center;gap:6px;">
        <span>${TYPE_ICONS[u.type]||'🔵'}</span>
        <div>
          <div class="unit-call">${esc(u.unit_id)}</div>
          <div class="unit-sub">${esc(u.name)} · ${esc(u.assignment||'')}</div>
        </div>
        <span class="unit-status s-${u.status}" style="margin-left:auto;">${u.status}</span>
      </div>
    </div>
  `).join('');
}

function saveUnit() {
  const unit_id = document.getElementById('u-id').value.trim();
  if(!unit_id) { alert('Radio ID required.'); return; }
  const lat = parseFloat(document.getElementById('u-lat').value);
  const lon = parseFloat(document.getElementById('u-lon').value);
  if(isNaN(lat)||isNaN(lon)) { alert('Valid lat/lon required.'); return; }

  const obj = {
    unit_id, lat, lon,
    name: document.getElementById('u-name').value.trim(),
    type: document.getElementById('u-type').value,
    status: document.getElementById('u-status').value,
    assignment: document.getElementById('u-assign').value.trim(),
    notes: document.getElementById('u-notes').value.trim(),
    updated: new Date().toISOString()
  };

  const existing = units.findIndex(u=>u.unit_id===unit_id);
  if(existing>=0) units[existing]=obj; else units.push(obj);

  ['u-id','u-name','u-assign','u-notes'].forEach(id=>document.getElementById(id).value='');
  saveData(); renderAll(); activateTab('units');
}

function editUnit(i) {
  const u = units[i]; if(!u) return;
  document.getElementById('u-id').value = u.unit_id||'';
  document.getElementById('u-name').value = u.name||'';
  document.getElementById('u-type').value = u.type||'Other';
  document.getElementById('u-status').value = u.status||'available';
  document.getElementById('u-lat').value = u.lat||'';
  document.getElementById('u-lon').value = u.lon||'';
  document.getElementById('u-assign').value = u.assignment||'';
  document.getElementById('u-notes').value = u.notes||'';
  activateTab('add');
  map.closePopup();
}

function removeUnit(i) {
  units.splice(i,1); saveData(); renderAll(); map.closePopup();
}

function panTo(lat,lon) { if(lat&&lon) map.setView([lat,lon],14); }

function pickUnit() {
  pickingUnit=true;
  map.getContainer().style.cursor='crosshair';
  alert('Click on the map to set this unit\'s location.');
}

function startZone() {
  drawingZone=true; zonePoints=[];
  if(zonePoly) { zoneLayer.removeLayer(zonePoly); zonePoly=null; }
  map.getContainer().style.cursor='crosshair';
}

function finishZone() {
  if(!drawingZone||zonePoints.length<3) { alert('Need at least 3 points to create a zone.'); return; }
  const name = document.getElementById('z-name').value.trim()||'Zone '+(zones.length+1);
  zones.push({ name, color: document.getElementById('z-color').value, points: [...zonePoints] });
  drawingZone=false; zonePoints=[]; zonePoly=null;
  map.getContainer().style.cursor='';
  document.getElementById('z-name').value='';
  saveData(); renderZones();
}

function clearZones() {
  if(!confirm('Clear all zones?')) return;
  zones=[]; saveData(); renderZones();
}

function removeZone(i) { zones.splice(i,1); saveData(); renderZones(); map.closePopup(); }

function toggleLayer(name) {
  const layers={units:unitLayer,zones:zoneLayer};
  const btn=document.getElementById('btn-'+name);
  if(map.hasLayer(layers[name])) { map.removeLayer(layers[name]); btn.classList.remove('active'); }
  else { map.addLayer(layers[name]); btn.classList.add('active'); }
}

function activateTab(name) {
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('tc-'+name).classList.add('active');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Expose for popup buttons
window.editUnit = editUnit;
window.removeUnit = removeUnit;
window.removeZone = removeZone;

initMap();
</script>

<script src="/lib/identity.js"></script>
</body>
</html>
