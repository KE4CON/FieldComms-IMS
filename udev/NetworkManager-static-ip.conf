# FieldComms Pi 5 — Static IP via NetworkManager
# This replaces hostapd/dnsmasq (Wi-Fi is handled by the ASUS RT-BE58 Go router)
#
# Apply with:
#   sudo nmcli con mod "Wired connection 1" \
#     ipv4.addresses 192.168.50.1/24 \
#     ipv4.method manual
#   sudo nmcli con up "Wired connection 1"
#
# Or use the install.sh automated setup (Step 4 — Pi Static IP)
#
# File: /etc/NetworkManager/system-connections/fieldcomms-static.nmconnection
# Install: sudo cp NetworkManager-static-ip.conf \
#          /etc/NetworkManager/system-connections/fieldcomms-static.nmconnection
# Permissions: sudo chmod 600 /etc/NetworkManager/system-connections/fieldcomms-static.nmconnection
# Reload: sudo nmcli con reload

[connection]
id=FieldComms Static IP
type=ethernet
autoconnect=true

[ethernet]
wake-on-lan=default

[ipv4]
method=manual
addresses=192.168.50.1/24
# No gateway — the Pi is not a router; the ASUS RT-BE58 Go handles routing
# dns=8.8.8.8;1.1.1.1  (uncomment if Pi needs DNS for package installs via ASUS WAN)

[ipv6]
method=disabled
