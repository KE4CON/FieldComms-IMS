# FieldComms nginx site configuration
# Install to: /etc/nginx/sites-available/fieldcomms
# Enable with: ln -s /etc/nginx/sites-available/fieldcomms /etc/nginx/sites-enabled/fieldcomms
# Test with:   sudo nginx -t
# Reload with: sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Web frontend ──────────────────────────────────────────────────────
    root /opt/fieldcomms/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Static asset caching (CSS, JS, images, fonts)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|avif|webp)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── API proxies ───────────────────────────────────────────────────────

    # FCC Lookup / Main API (port 5050)
    location /api/ {
        proxy_pass         http://127.0.0.1:5050/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Health Monitor API (port 5051)
    location /health-api/ {
        proxy_pass         http://127.0.0.1:5051/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ICS Platform API (port 5055)
    location /ics-api/ {
        proxy_pass         http://127.0.0.1:5055/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Reference Library API (port 5056) — allow large uploads
    location /refs-api/ {
        proxy_pass            http://127.0.0.1:5056/refs/;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_read_timeout    120;
        client_max_body_size  200M;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Offline Map Tile Server (port 8083)
    location /tiles/ {
        proxy_pass         http://127.0.0.1:8083/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10;
        # Tile caching — tiles are static once downloaded
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Graywolf APRS client (port 8080) — WebSocket support
    location /aprs/ {
        proxy_pass             http://127.0.0.1:8080/;
        proxy_set_header       Host $host;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_read_timeout     3600;
    }

    # Pat Winlink backup client (port 8090)
    location /winlink/ {
        proxy_pass         http://127.0.0.1:8090/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60;
    }

    # Kiwix offline library (port 8081)
    location /kiwix/ {
        proxy_pass         http://127.0.0.1:8081/;
        proxy_set_header   Host $host;
        proxy_read_timeout 30;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "no-referrer"            always;

    # ── Logging ───────────────────────────────────────────────────────────
    access_log /var/log/nginx/fieldcomms_access.log;
    error_log  /var/log/nginx/fieldcomms_error.log;
}
