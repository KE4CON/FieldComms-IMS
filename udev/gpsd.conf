# gpsd configuration for FieldComms EmComm Server
# /etc/default/gpsd
#
# Devices: gpsd will auto-detect from the udev rule below.
# If using a known fixed device, set it here explicitly.
#
# Common USB GPS devices:
#   /dev/ttyUSB0  — GlobalSat BU-353, most USB serial GPS
#   /dev/ttyACM0  — u-blox, Adafruit Ultimate GPS (USB CDC)
#   /dev/ttyAMA0  — UART GPS HAT (Pi GPIO, requires disabling Bluetooth)
#
# The /dev/gps0 symlink is created by the udev rule below
# and always points to whichever port the GPS is on.

# Devices that gpsd should control
DEVICES="/dev/gps0"

# Options for gpsd
# -n  : don't wait for a client to connect before polling
# -F  : create socket file for gpsctl
GPSD_OPTIONS="-n -F /var/run/gpsd.sock"

# Automatically start gpsd
START_DAEMON="true"

# Log NMEA to file (optional — comment out to disable)
# GPSD_SOCKET="/var/run/gpsd.sock"
